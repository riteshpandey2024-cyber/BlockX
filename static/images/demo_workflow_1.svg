<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:8; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size:16px; fill:#1a202c; }
    .label { font-size:14px; fill:#2d3748; }
    .arrow { stroke:#2d3748; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="40" y="80" width="200" height="80" class="box"/>
  <text x="140" y="125" text-anchor="middle" class="text">User</text>

  <rect x="300" y="40" width="220" height="160" class="box"/>
  <text x="410" y="125" text-anchor="middle" class="text">Flask App<br/>(`app.py`)</text>

  <rect x="560" y="80" width="200" height="80" class="box"/>
  <text x="660" y="125" text-anchor="middle" class="text">Browser / UI</text>

  <!-- Arrows -->
  <path d="M240 120 L300 120" class="arrow" />
  <path d="M520 120 L560 120" class="arrow" />

  <!-- Labels -->
  <text x="270" y="100" text-anchor="middle" class="label">HTTP Request</text>
  <text x="490" y="100" text-anchor="middle" class="label">Response (HTML/JSON)</text>

  <!-- Note -->
  <text x="400" y="270" text-anchor="middle" class="label">Simple workflow: User → `app.py` → Frontend (`templates/`, `static/`)</text>
</svg>
