<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <style>
    .screen { fill:#f7fafc; stroke:#4a5568; stroke-width:2; rx:6; }
    .card { fill:#ffffff; stroke:#cbd5e0; stroke-width:1; rx:6; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size:18px; fill:#2d3748; font-weight:700 }
    .text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#4a5568 }
  </style>

  <!-- Mock browser window -->
  <rect x="30" y="30" width="840" height="340" class="screen"/>
  <text x="70" y="60" class="title">BlockX — Demo UI (mockup)</text>

  <!-- Left panel -->
  <rect x="60" y="90" width="240" height="220" class="card"/>
  <text x="180" y="120" text-anchor="middle" class="text">Input</text>
  <text x="80" y="160" class="text">- Enter data</text>
  <text x="80" y="180" class="text">- Click submit</text>

  <!-- Center panel -->
  <rect x="340" y="90" width="220" height="220" class="card"/>
  <text x="450" y="120" text-anchor="middle" class="text">Processing</text>
  <text x="360" y="160" class="text">- `app.py` routes</text>
  <text x="360" y="180" class="text">- Server logic / APIs</text>

  <!-- Right panel -->
  <rect x="620" y="90" width="200" height="220" class="card"/>
  <text x="720" y="120" text-anchor="middle" class="text">Output</text>
  <text x="640" y="160" class="text">- Rendered HTML</text>
  <text x="640" y="180" class="text">- Visual results / charts</text>

  <!-- Flow arrows -->
  <path d="M300 200 L340 200" stroke="#2d3748" stroke-width="2" marker-end="url(#a)" fill="none"/>
  <path d="M560 200 L620 200" stroke="#2d3748" stroke-width="2" marker-end="url(#a)" fill="none"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>

  <text x="450" y="350" text-anchor="middle" class="text">Replace these SVGs with real screenshots: `static/images/demo_workflow_1.svg` and `_2.svg`</text>
</svg>
