<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockchain Explorer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <header>
        <div class="logo">
          <div class="logo-title">⬡ BlockX</div>
          <div class="logo-sub">Blockchain Visualizer</div>
        </div>
        <div class="header-stats">
          <div class="stat">
            <div class="stat-label">Blocks</div>
            <div class="stat-value" id="stat-blocks">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Difficulty</div>
            <div class="stat-value" id="stat-diff">3</div>
          </div>
          <div class="stat">
            <div class="stat-label">Status</div>
            <div
              class="stat-value"
              id="stat-status"
              style="color: var(--muted)"
            >
              —
            </div>
          </div>
        </div>
      </header>

      <!-- INIT / SETTINGS -->
      <div class="panel" id="init-panel">
        <div class="panel-title">▸ Chain Configuration</div>
        <div
          style="display: flex; align-items: center; gap: 28px; flex-wrap: wrap"
        >
          <div class="difficulty-row">
            <span class="diff-label">Difficulty</span>
            <input
              type="range"
              id="difficulty-slider"
              min="1"
              max="5"
              value="3"
            />
            <span class="diff-val" id="diff-display">3</span>
            <span class="diff-label" style="margin-left: 4px"
              >Leading Zeros</span
            >
          </div>
          <button id="init-btn" class="btn btn-primary">
            Initialise Chain
          </button>
          <button id="reset-btn" class="btn btn-danger">Reset</button>
        </div>
      </div>

      <!-- ADD BLOCK -->
      <div class="panel" id="add-panel" style="display: none">
        <div class="panel-title">▸ Add New Block</div>
        <div class="form-row">
          <div class="field">
            <label>Transaction Data</label>
            <input
              type="text"
              id="block-data"
              placeholder="e.g. Alice → Bob: 5 BTC"
            />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px">
            <label
              style="
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 2px;
              "
              >&nbsp;</label
            >
            <button class="btn btn-primary" id="mine-btn">⛏ Mine Block</button>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px">
            <label
              style="
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 2px;
              "
              >&nbsp;</label
            >
            <button id="load-samples-btn" class="btn btn-outline">
              Load Sample Blocks
            </button>
          </div>
        </div>
        <div id="mining-status">
          <div class="spinner"></div>
          <span class="mine-text">Mining in progress...</span>
          <span id="mine-nonce">Nonce: 0</span>
        </div>
      </div>

      <!-- CHAIN DISPLAY -->
      <div class="panel" id="chain-panel" style="display: none">
        <div class="panel-title">▸ Blockchain</div>
        <div class="controls-row">
          <button id="validate-btn" class="btn btn-outline">
            ✓ Validate Chain
          </button>
          <div class="sep"></div>
        </div>
        <div id="validation-result">
          <span class="val-icon"></span>
          <span id="val-message"></span>
        </div>
        <div id="chain-container"></div>
      </div>

      <!-- TAMPER PANEL -->
      <div class="panel" id="tamper-panel" style="display: none">
        <div class="panel-title">▸ Tamper Simulation</div>
        <p
          style="
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.7;
          "
        >
          Modify a block's data to simulate a tampering attack. Then validate
          the chain to see integrity fail.
        </p>
        <div class="tamper-row">
          <div class="field">
            <label>Block Index</label>
            <select id="tamper-index" style="width: 90px"></select>
          </div>
          <div class="field">
            <label>New Data</label>
            <input
              type="text"
              id="tamper-data"
              placeholder="Tampered transaction..."
            />
          </div>
          <div class="field">
            <label style="visibility: hidden">.</label>
            <button id="tamper-btn" class="btn btn-danger">⚠ Tamper</button>
          </div>
          <div class="field">
            <label style="visibility: hidden">.</label>
            <button id="rehash-btn" class="btn btn-outline">Rehash From Here</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
